name: rewardpoints
description: デジタル庁デザインシステムを使ったベースFlutterアプリ
publish_to: "none"
version: 1.9.16+110

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Navigation
  go_router: ^13.0.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # DI
  get_it: ^7.7.0

  # SQLite
  sqflite: ^2.3.3
  path: ^1.9.0

  # Package info
  package_info_plus: ^8.0.0

  # URL launcher (for licenses)
  url_launcher: ^6.3.0

  # Shared preferences
  shared_preferences: ^2.3.0

  # Logging
  logger: ^2.4.0
  path_provider: ^2.1.0

  # Equatable (value objects)
  equatable: ^2.0.5

  # Data export/import
  file_saver: ^0.3.1
  file_picker: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3
  mockito: ^5.4.4
  sqflite_common_ffi: ^2.3.3
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icon/
  fonts:
    - family: NotoSansJP
      fonts:
        - asset: assets/fonts/NotoSansJP-Regular.ttf
          weight: 400
        - asset: assets/fonts/NotoSansJP-Bold.ttf
          weight: 700

# Run: dart run flutter_launcher_icons
# Android 8+ uses the vector drawable in mipmap-anydpi-v26/ directly.
flutter_launcher_icons:
  android: "ic_launcher"
  image_path: "assets/icon/app_icon.png"
  # Match splash screen background (launch_background.xml).
  adaptive_icon_background: "#2060C0"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  adaptive_icon_monochrome: "assets/icon/app_icon.png"
  min_sdk_android: 21
