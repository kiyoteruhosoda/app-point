plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode")
if (flutterVersionCode == null) {
    flutterVersionCode = "1"
}

def flutterVersionName = localProperties.getProperty("flutter.versionName")
if (flutterVersionName == null) {
    flutterVersionName = "1.0"
}

// Release signing — reads android/key.properties written by CI or local dev.
// See docs/signing.md for setup instructions.
def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file("key.properties")
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withReader("UTF-8") { reader ->
        keystoreProperties.load(reader)
    }
}
def hasKeystore = keystoreProperties.getProperty("storeFile") != null
def isReleaseBuildRequested = gradle.startParameter.taskNames.any {
    it.toLowerCase().contains("release")
}
def requireReleaseKeystore =
    (System.getenv("REQUIRE_RELEASE_KEYSTORE") ?: "false").toBoolean()

if (isReleaseBuildRequested && !hasKeystore && requireReleaseKeystore) {
    throw new GradleException(
        "Release build requires android/key.properties and a matching release keystore. " +
        "Without it, generated APK cannot update an already installed release app (App not installed). " +
        "Set REQUIRE_RELEASE_KEYSTORE=false to allow debug-signed release builds. See docs/signing.md."
    )
}

if (isReleaseBuildRequested && !hasKeystore && !requireReleaseKeystore) {
    println("[signing] WARNING: android/key.properties not found. Building debug-signed release APK.")
}

android {
    namespace = "com.nolumia.rewardpoints"
    compileSdk = flutter.compileSdkVersion
    // integration_test requires NDK 26.3.11579264; pin here so all
    // plugins resolve to the same (highest) version.
    ndkVersion = "26.3.11579264"

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_17
    }

    signingConfigs {
        if (hasKeystore) {
            release {
                keyAlias     keystoreProperties["keyAlias"]
                keyPassword  keystoreProperties["keyPassword"]
                storeFile    file(keystoreProperties["storeFile"])
                storePassword keystoreProperties["storePassword"]
            }
        }
    }

    defaultConfig {
        applicationId = "com.nolumia.rewardpoints"
        minSdk = flutter.minSdkVersion
        targetSdk = flutter.targetSdkVersion
        versionCode = flutterVersionCode.toInteger()
        versionName = flutterVersionName
    }

    buildTypes {
        debug {
            // Keep debug builds from colliding with release installs —
            // different applicationId lets both APKs coexist and sidesteps
            // signature-mismatch install failures when switching builds.
            applicationIdSuffix ".debug"
            versionNameSuffix "-debug"
        }
        release {
            if (hasKeystore) {
                signingConfig = signingConfigs.release
            }
        }
    }
}

flutter {
    source = "../.."
}
